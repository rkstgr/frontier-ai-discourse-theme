<script type="text/discourse-plugin" version="0.8">
  // Add homepage link to header if enabled
  api.onPageChange(() => {
    const existing = document.querySelector('.frontier-home-link');
    if (existing) return;

    if (settings.show_homepage_link) {
      const headerIcons = document.querySelector('.d-header-icons');
      if (headerIcons) {
        const link = document.createElement('a');
        link.href = settings.homepage_url;
        link.className = 'frontier-home-link';
        link.title = 'frontier-ai.eu';
        link.target = '_blank';
        link.rel = 'noopener';
        link.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>`;
        headerIcons.prepend(link);
      }
    }
  });
</script>

<style>
  .frontier-home-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    color: var(--frontier-text-secondary, #55555d);
    transition: color 0.15s ease;
    margin-right: 4px;
  }

  .frontier-home-link:hover {
    color: var(--frontier-text-primary, #111113);
  }
</style>
